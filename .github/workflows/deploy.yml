name: CI/CD – Build & Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:        # allow manual trigger from GitHub UI

# Cancel any in-progress run for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Job 1 – Build and push Docker images to GitHub Container Registry
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_FRONTEND=ghcr.io/${OWNER}/idafaty-frontend" >> $GITHUB_ENV
          echo "IMAGE_BACKEND=ghcr.io/${OWNER}/idafaty-backend"   >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── Backend image ───────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          target:     runner              # production stage only
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2 – Deploy to VPS via SSH
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs:     GITHUB_ACTOR,GITHUB_SHA
          script: |
            set -euo pipefail

            # Authenticate Docker to GHCR so it can pull the new images
            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Run the deploy script (pulls code + images, restarts, health-checks)
            bash /var/www/idafaty/scripts/deploy.sh

            echo "Deployed commit $GITHUB_SHA"
