# =============================================================================
# Nginx config for idafaty.com
# Deploy to: /etc/nginx/sites-available/idafaty.com
# Enable with: ln -s /etc/nginx/sites-available/idafaty.com /etc/nginx/sites-enabled/
# =============================================================================

upstream ridafaty_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream ridafaty_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (also handles Let's Encrypt ACME challenge) ────────
server {
    listen 80;
    listen [::]:80;
    server_name idafaty.com www.idafaty.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://idafaty.com$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.idafaty.com;

    ssl_certificate     /etc/letsencrypt/live/idafaty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idafaty.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://idafaty.com$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name idafaty.com;

    ssl_certificate     /etc/letsencrypt/live/idafaty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idafaty.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Upload size ─────────────────────────────────────────────────────────
    client_max_body_size 50m;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── API → backend ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ridafaty_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files → backend (with caching) ─────────────────────────────
    location /uploads/ {
        proxy_pass         http://ridafaty_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            30d;
        add_header         Cache-Control "public, no-transform";
    }

    # ── Static assets from Nuxt build (long-lived cache) ────────────────────
    location /_nuxt/ {
        proxy_pass         http://ridafaty_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # ── Frontend SSR → Nuxt ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://ridafaty_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
