# ─────────────────────────────────────────────────────────────────────────────
# Root compose file – orchestrates all project services.
#
# Usage:
#   docker compose up --build          # start everything (dev mode)
#   docker compose up --build backend  # start one service
#   docker compose down                # stop & remove containers
#   docker compose down -v             # also wipe named volumes (clears DB)
#
# Tip: use `make up` (see root Makefile) as a shortcut.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ---------------------------------------------------------------------------
  # MySQL 8 database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ridafaty_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ridafaty}
      MYSQL_USER: ${MYSQL_USER:-ridafaty}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - '3306:3306'            # expose to host for local clients (Prisma Studio, DBeaver…)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Test with the APP user so we know the DB + user are fully initialised,
      # not just that the server process is running.
      test: ['CMD-SHELL', 'mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD -e "SELECT 1" $$MYSQL_DATABASE']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - ridafaty_net

  # ---------------------------------------------------------------------------
  # Node.js + Express backend (dev – hot reload via nodemon)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev              # use the dev stage for hot reload
    image: ridafaty-backend:dev
    container_name: ridafaty_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-ridafaty}:${MYSQL_PASSWORD:-secret}@mysql:3306/${MYSQL_DATABASE:-ridafaty}
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: debug
      APP_URL: ${APP_URL:-http://localhost:3001}
    env_file:
      - .env
    volumes:
      # Mount source for hot reload; keep node_modules from the image untouched
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules        # anonymous volume – never overwritten by host
      - uploads_data:/app/uploads  # persist uploaded files across restarts
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:3001/api/health']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    networks:
      - ridafaty_net

  # ---------------------------------------------------------------------------
  # Nuxt 3 SSR frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3001/api}
    image: ridafaty-frontend:local
    container_name: ridafaty_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_API_SECRET: ${NUXT_API_SECRET:-changeme}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3001/api}
      NUXT_API_BASE_INTERNAL: http://backend:3001/api
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ridafaty_net

  # ---------------------------------------------------------------------------
  # Optional: Nginx reverse-proxy – uncomment when ready
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: ridafaty_nginx
  #   restart: unless-stopped
  #   ports:
  #     - '80:80'
  #     - '443:443'
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     frontend:
  #       condition: service_healthy
  #     backend:
  #       condition: service_healthy
  #   networks:
  #     - ridafaty_net

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  ridafaty_net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
